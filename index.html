<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Salary Sheet</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="wallet.png">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="wallet.png">
   <!-- ফন্ট এবং CSS দ্রুত লোড করার জন্য Preload -->
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" as="style">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style">

<!-- এরপর আপনার রেগুলার লিংকগুলো থাকবে -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff; 
            min-width: 100%;
        }
        
        /* Document Container Styling */
        .document-container {
            width: 100%; 
            min-height: auto !important; 
            margin: 2rem auto;
            background: #ffffff;
            padding: 1.5cm 1.5cm;
            border-radius: 4px;
            position: relative;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        th, td {
            border: 1px solid #1f2937; 
            padding: 10px 10px;
            color: #111827;
            font-size: 14px;
        }

        th {
            background-color: #f3f4f6;
            font-weight: bold;
        }

        .name-col { white-space: nowrap; font-weight: 500; }
        
        /* Inputs inside table */
        input[type="number"], .editable-text {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            font-size: inherit;
            color: #111827;
            text-align: right;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }

        /* === Absent Column হাইড/শো করার সিএসএস === */
        .absent-col {
            display: none;
        }
        .show-absent .absent-col {
            display: table-cell;
        }

        /* Highlight editable areas in web view */
        @media screen {
            .input-cell {
                background-color: #f8fafc;
                transition: background-color 0.2s, box-shadow 0.2s;
                cursor: text;
            }
            .input-cell:hover, .input-cell:focus-within {
                background-color: #e0f2fe;
                box-shadow: inset 0 0 0 1px #3b82f6;
            }
            .inline-input {
                border-bottom: 1px dashed #64748b;
                min-width: 120px;
                display: inline-block;
                padding: 0 4px;
                outline: none;
                transition: background 0.2s;
            }
            .inline-input:focus { background-color: #e0f2fe; }
            
            /* Custom styling for the dropdown */
            .type-select {
                background-color: #e2e8f0;
                border: 1px solid #94a3b8;
                border-radius: 4px;
                padding: 2px 5px;
                font-weight: bold;
                color: #0f172a;
                outline: none;
                cursor: pointer;
            }
        }

        /* Print Specific Styles */
        @media print {
            @page {
                size: A4 portrait;
                margin: 2cm 1.5cm;
                page-break-after:avoid; 
            }
            body {
                background-color: transparent !important;
                margin: 0; padding: 0;
                min-width: auto; 
            }
            .document-container {
                box-shadow: none !important; margin: 0 !important; padding: 0 !important;
                border: none !important; border-radius: 0 !important;
                width: 100% !important; max-width: 100% !important;
            }
            .no-print { display: none !important; } 
            
            th { background-color: transparent !important; color-adjust: exact; -webkit-print-color-adjust: exact; }
            th, td { border: 1px solid #000 !important; }
            .input-cell { background-color: transparent !important; box-shadow: none !important; }
            .inline-input { border-bottom: none !important; padding: 0 !important; padding-left: 5px !important; }
            
            /* Replace dropdown with plain text on print */
            .type-select {
                appearance: none; -webkit-appearance: none;
                border: none; background: transparent; color: #000;
                font-weight: 600; font-size: 14px; padding: 0; text-align: center;
                display: block; width: 100%;
            }
            
            /* For the new month select dropdown printing */
            #month-input {
                appearance: none; -webkit-appearance: none;
                background: transparent; border: none;
                color: #000; font-family: inherit; font-size: inherit;
                text-align: left;
            }

            /* === প্রিন্ট করার সময় Absent কলাম সম্পূর্ণ গায়েব থাকবে === */
            .absent-col {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- Top Action Bar (Web Only) -->
    <div class="max-w-4xl mx-auto mt-6 mb-2 flex justify-between items-center px-4 no-print">
        <div class="flex items-center gap-3">
            <button onclick="window.print()" class="bg-indigo-600 text-white px-6 py-2.5 rounded shadow hover:bg-indigo-700 font-semibold flex items-center gap-2 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                Print Sheet
            </button>
            <span id="save-status" class="text-sm text-green-600 font-medium opacity-0 transition-opacity duration-300">✓ Auto-saved</span>
        </div>
        <!-- === নতুন: Unlock Edit চেকবক্স যুক্ত করা হয়েছে === -->
        <div class="flex items-center gap-5">
            <label class="flex items-center gap-2 cursor-pointer select-none text-gray-700 font-medium">
                <input type="checkbox" id="edit-toggle" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                <span>Unlock Edit</span>
            </label>
            <button onclick="resetData()" class="bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded hover:bg-red-100 font-medium text-sm transition">
                Reset Data
            </button>
        </div>
    </div>

    <!-- Main Document -->
    <div class="document-container">
        
        <!-- Pre-printed Pad Header Mockup (Hidden on Print) -->
        <div class="text-center mb-8 no-print border-b-2 border-gray-200 pb-6">
            <h1 class="text-3xl font-bold text-gray-900 tracking-wide">Abdur Razzak Dakhil Madrasa</h1>
            <p class="text-gray-600 mt-1 font-medium">Sarafbhata, Rangunia, Chattogram.</p>
          
        </div>

        <!-- Document Title -->
        <div style="margin-top: 80px" class="text-center mb-6">
            <h2 id="statement-title" class="text-xl font-bold inline-block border-b-2 border-black pb-1 uppercase tracking-wider">Salary Statement</h2>
        </div>

        <!-- Info Section (Month & Year) -->
        <div class="flex justify-between mb-4 font-semibold text-gray-800 no-print">
            <div>
                Month: 
                <select class="inline-input" id="month-input" data-key="month" style="appearance: none; -webkit-appearance: none; cursor: pointer; text-align: left; background: transparent; font-family: inherit; font-size: inherit; color: inherit;">
                    <option value="January">January</option>
                    <option value="February">February</option>
                    <option value="March">March</option>
                    <option value="April">April</option>
                    <option value="May">May</option>
                    <option value="June">June</option>
                    <option value="July">July</option>
                    <option value="August">August</option>
                    <option value="September">September</option>
                    <option value="October">October</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                </select>
            </div>
            <div>
                Year: <span class="inline-input" id="year-input" contenteditable="true" data-key="year">2026</span>
            </div>
        </div>

        <!-- Table -->
        <table id="main-table" class="show-absent">
            <thead>
                <tr>
                    <th style="width: 3%;">Sl.</th>
                    <th style="width: 22%; text-align: left;">Name of Employee</th>
                    <th style="width: 23%; text-align: left;">Designation</th>
                    <th style="width: 13%; text-align: center;">Salary</th>
                    <!-- Absent (Days) কলাম -->
                    <th class="absent-col" style="width: 8%; text-align: center;">Absent</th>
                    <th style="width: 13%;">
                        <select id="extra-type" class="type-select w-full text-center">
                            <option value="deduction" selected>Deduction</option>
                            <option value="bonus">Bonus</option>
                        </select>
                    </th>
                    <th style="width: 13%; text-align: center;">Total</th>
                    <th style="width: 13%;">Signature</th>
                </tr>
            </thead>
            <tbody id="salary-body">
                <!-- Rows will be injected by JavaScript -->
            </tbody>
        </table>

        <!-- === টেবিলের বাইরে Grand Total === -->
        <div class="flex justify-end mt-4 pr-4">
            <div class="text-lg font-bold text-black pb-1">
                Grand Total: <span id="grand-total-text" class="ml-3 inline-block min-w-[100px] text-right"></span>/=
            </div>
        </div>

        <!-- Signatures -->
        <div style="margin-top:70px;" class="flex justify-between text-center text-sm font-bold">
            <div>
                <div class="border-t border-black w-32 mx-auto mb-1"></div>
                <p>Prepared By</p>
                <p class="font-normal text-xs">(Signature & Date)</p>
            </div>
            <div>
                <div class="border-t border-black w-32 mx-auto mb-1"></div>
                <p>Date of Payment</p>
            </div>
            <div>
                <div class="border-t border-black w-40 mx-auto mb-1"></div>
                <p>Superintendent</p>
                <p class="font-normal text-xs">(Signature & Seal)</p>
                
            </div>
        </div>

    </div>

    <!-- Logic Script -->
    <script>
        // === কন্ট্রোল প্যানেল স্টোরেজ থেকে পড়া হচ্ছে ===
        // ডিফল্ট false থাকবে, সেভ করা থাকলে সেটা নেবে।
        let allowManualEdit = localStorage.getItem('madrasa_edit_mode') === 'true';

        // Employee Data
        const employees = [
            { id: 1, name: "Md Jabedul Islam", desig: "Superintendent", defaultSalary: 5000 },
            { id: 2, name: "Md Rakibul Anwar", desig: "Assistant Head", defaultSalary: 4500 },
            { id: 3, name: "Nandita Shil", desig: "Senior Teacher", defaultSalary: 4500 },
            { id: 4, name: "Md Joynal Abedin", desig: "Senior Mudarris", defaultSalary: 4500 },
            { id: 5, name: "Mahfuzul Hoque Ador", desig: "Senior Teacher", defaultSalary: 4000 },
            { id: 6, name: "Muhammad Sohel", desig: "Assistant Teacher", defaultSalary: 3300 },
            { id: 7, name: "Any Akter Nishu", desig: "Assistant Teacher", defaultSalary: 3500 },
            { id: 8, name: "Nur Kamal Tamjid", desig: "Assistant Mudarris", defaultSalary: 3500 },
            { id: 9, name: "Sadia Jahan", desig: "Assistant Teacher", defaultSalary: 3300 },
            { id: 10, name: "Sabrina Sultana Priya", desig: "Assistant Teacher", defaultSalary: 3300 },
            { id: 11, name: "Tausiful Hoque Mayen", desig: "Assistant Teacher", defaultSalary: 3300 },
            { id: 12, name: "Raisul Islam Saied", desig: "Assistant Teacher", defaultSalary: 3300 },
            { id: 13, name: "Fahmida Sikder Jhuma", desig: "Assistant Teacher", defaultSalary: 3300 },
            { id: 14, name: "Urmi Karim Samu", desig: "Assistant Teacher", defaultSalary: 3300 },
            { id: 15, name: "Niamat Ali", desig: "Office Assistant", defaultSalary: 2600 }
        ];

        const tbody = document.getElementById('salary-body');
        const monthInput = document.getElementById('month-input');
        const yearInput = document.getElementById('year-input');
        const extraTypeSelect = document.getElementById('extra-type');
        const mainTable = document.getElementById('main-table');
        const editToggle = document.getElementById('edit-toggle');
        let saveTimeout;

        function updateTitle() {
            const titleEl = document.getElementById('statement-title');
            if (titleEl) {
                titleEl.innerText = `Salary Statement of ${monthInput.value} - ${yearInput.innerText}`;
            }
        }

        // Initialize Table
        function renderTable() {
            tbody.innerHTML = '';
            
            const readonlyAttr = allowManualEdit ? '' : 'readonly';

            employees.forEach(emp => {
                const tr = document.createElement('tr');
                tr.setAttribute('data-id', emp.id);
                tr.innerHTML = `
                    <td class="text-center">${emp.id}</td>
                    <td class="name-col">${emp.name}</td>
                    <td>${emp.desig}</td>
                    <td class="input-cell"><input type="number" class="salary-input" data-field="salary" value="${emp.defaultSalary}" ${readonlyAttr}></td>
                    <td class="input-cell absent-col"><input type="number" class="absent-input" placeholder="0"></td>
                    <td class="input-cell"><input type="number" class="extra-input" data-field="extra" ${readonlyAttr}></td>
                    <td class="text-right font-semibold total-col"></td>
                    <td></td>
                `;
                tbody.appendChild(tr);
            });
            attachListeners();
        }

        function getDaysInMonth(monthName, yearStr) {
            const year = parseInt(yearStr) || new Date().getFullYear();
            const monthIndex = new Date(Date.parse(monthName + " 1, 2020")).getMonth() + 1;
            return new Date(year, monthIndex, 0).getDate();
        }

        const recalcAll = () => {
            const daysInMonth = getDaysInMonth(monthInput.value, yearInput.innerText);
            
            document.querySelectorAll('tr[data-id]').forEach(tr => {
                const salaryAmount = parseFloat(tr.querySelector('.salary-input').value) || 0;
                const extraInput = tr.querySelector('.extra-input');
                const absentInput = tr.querySelector('.absent-input');
                
                if (absentInput.value !== '') {
                    const absentDays = parseFloat(absentInput.value) || 0;
                    if (absentDays > daysInMonth) {
                        absentInput.value = '';
                    }
                }
                
                if (extraTypeSelect.value === 'deduction') {
                    const absentDays = parseFloat(absentInput.value) || 0;
                    if (absentDays > 0 && salaryAmount > 0) {
                        extraInput.value = Math.round((salaryAmount / daysInMonth) * absentDays);
                    } else {
                        extraInput.value = ''; 
                    }
                } else if (extraTypeSelect.value === 'bonus') {
                    if (salaryAmount > 0) {
                        extraInput.value = Math.round(salaryAmount / 2); 
                    } else {
                        extraInput.value = '';
                    }
                }
            });
            document.querySelectorAll('tr[data-id]').forEach(calculateRow);
            calculateGrandTotal();
            updateTitle();
            triggerSave();
        };

        function attachListeners() {
            document.querySelectorAll('input[type="number"]').forEach(input => {
                input.addEventListener('input', (e) => {
                    const tr = input.closest('tr');
                    const salaryAmount = parseFloat(tr.querySelector('.salary-input').value) || 0;
                    const extraInput = tr.querySelector('.extra-input');
                    const absentInput = tr.querySelector('.absent-input');

                    if (input.classList.contains('absent-input')) {
                        const inputDays = parseFloat(input.value) || 0;
                        const daysInMonth = getDaysInMonth(monthInput.value, yearInput.innerText);
                        
                        if (inputDays > daysInMonth) {
                            alert("ভুল ইনপুট! " + monthInput.value + " মাসে সর্বোচ্চ " + daysInMonth + " দিন রয়েছে।");
                            input.value = ''; 
                        }
                    }

                    if (input.classList.contains('salary-input') && extraTypeSelect.value === 'bonus') {
                        if (salaryAmount > 0) {
                            extraInput.value = Math.round(salaryAmount / 2);
                        } else {
                            extraInput.value = ''; 
                        }
                    }

                    if ((input.classList.contains('salary-input') || input.classList.contains('absent-input')) && extraTypeSelect.value === 'deduction') {
                        let absentDays = parseFloat(absentInput.value) || 0;
                        const daysInMonth = getDaysInMonth(monthInput.value, yearInput.innerText);

                        if (input.classList.contains('absent-input') && absentDays > daysInMonth) {
                            alert(`Invalid input! ${monthInput.value} has only ${daysInMonth} days.`);
                            absentInput.value = '';
                            absentDays = 0;
                        }

                        if (absentDays > 0 && salaryAmount > 0) {
                            extraInput.value = Math.round((salaryAmount / daysInMonth) * absentDays);
                        } else if (input.classList.contains('absent-input') && absentDays === 0) {
                            extraInput.value = ''; 
                        }
                    }

                    calculateRow(tr);
                    calculateGrandTotal(); 
                    triggerSave();
                });
            });

            monthInput.addEventListener('change', recalcAll);
            yearInput.addEventListener('input', recalcAll);

            extraTypeSelect.addEventListener('change', () => {
                if(extraTypeSelect.value === 'deduction') {
                    mainTable.classList.add('show-absent');
                } else {
                    mainTable.classList.remove('show-absent');
                }
                recalcAll(); 
            });
        }

        function calculateRow(tr) {
            const salary = parseFloat(tr.querySelector('.salary-input').value) || 0;
            const extra = parseFloat(tr.querySelector('.extra-input').value) || 0;
            const isBonus = extraTypeSelect.value === 'bonus';
            
            let total = 0;
            if (salary > 0 || extra > 0) {
                total = isBonus ? (salary + extra) : (salary - extra);
            }
            
            const totalCol = tr.querySelector('.total-col');
            if(total === 0 && !tr.querySelector('.salary-input').value && !tr.querySelector('.extra-input').value) {
                totalCol.innerText = '';
            } else {
                totalCol.innerText = total.toLocaleString('en-IN');
            }
        }

        function calculateGrandTotal() {
            let grandTotal = 0;
            document.querySelectorAll('.total-col').forEach(col => {
                const val = parseFloat(col.innerText.replace(/,/g, '')) || 0;
                grandTotal += val;
            });
            
            const grandTotalEl = document.getElementById('grand-total-text');
            if (grandTotal > 0) {
                grandTotalEl.innerText = grandTotal.toLocaleString('en-IN');
            } else {
                grandTotalEl.innerText = '';
            }
        }

        const STORAGE_KEY = 'madrasa_salary_data';

        function triggerSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveData, 500); 
        }

        function saveData() {
            const data = {
                month: monthInput.value,
                year: yearInput.innerText,
                type: extraTypeSelect.value,
                records: {}
            };

            document.querySelectorAll('tr[data-id]').forEach(tr => {
                const id = tr.getAttribute('data-id');
                const s = tr.querySelector('.salary-input').value;
                const a = tr.querySelector('.absent-input').value;
                const e = tr.querySelector('.extra-input').value;
                data.records[id] = { salary: s, absent: a, extra: e };
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            showSaveStatus();
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                
                if(data.month) monthInput.value = data.month;
                if(data.year) yearInput.innerText = data.year;
                if(data.type) extraTypeSelect.value = data.type;

                if(extraTypeSelect.value === 'deduction') {
                    mainTable.classList.add('show-absent');
                } else {
                    mainTable.classList.remove('show-absent');
                }

                document.querySelectorAll('tr[data-id]').forEach(tr => {
                    const id = tr.getAttribute('data-id');
                    if (data.records && data.records[id]) {
                        if(data.records[id].salary !== undefined && data.records[id].salary !== '') {
                            tr.querySelector('.salary-input').value = data.records[id].salary;
                        }
                        tr.querySelector('.absent-input').value = data.records[id].absent || '';
                        tr.querySelector('.extra-input').value = data.records[id].extra || '';
                        calculateRow(tr);
                    }
                });
            } else {
                document.querySelectorAll('tr[data-id]').forEach(calculateRow);
            }
            calculateGrandTotal(); 
            updateTitle(); 
        }

        function resetData() {
            if (confirm("Are you sure you want to clear inputs for a new month? (Salary will be kept)")) {
                
                const currentMonthName = new Date().toLocaleString('en-US', { month: 'long' });
                monthInput.value = currentMonthName;
                document.getElementById('year-input').innerText = new Date().getFullYear().toString();
                
                extraTypeSelect.value = 'deduction';
                mainTable.classList.add('show-absent');
                
                document.querySelectorAll('tr[data-id]').forEach(tr => {
                    tr.querySelector('.absent-input').value = '';
                    tr.querySelector('.extra-input').value = '';
                    calculateRow(tr); 
                });
                
                calculateGrandTotal();
                updateTitle(); 
                saveData(); 
            }
        }

        function showSaveStatus() {
            const status = document.getElementById('save-status');
            status.style.opacity = '1';
            setTimeout(() => { status.style.opacity = '0'; }, 2000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Edit Toggle Logic
            editToggle.checked = allowManualEdit;
            editToggle.addEventListener('change', (e) => {
                allowManualEdit = e.target.checked;
                localStorage.setItem('madrasa_edit_mode', allowManualEdit);
                
                // সাথে সাথে সব ঘরে readonly যোগ বা রিমুভ করা
                document.querySelectorAll('.salary-input, .extra-input').forEach(input => {
                    if (allowManualEdit) {
                        input.removeAttribute('readonly');
                    } else {
                        input.setAttribute('readonly', 'true');
                    }
                });
            });

            const currentMonthName = new Date().toLocaleString('en-US', { month: 'long' });
            monthInput.value = currentMonthName;
            
            renderTable();
            loadData();
            updateTitle(); 
        });

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js")
            .then(reg => {
                reg.update();
            });
        }
    </script>
</body>
</html>
