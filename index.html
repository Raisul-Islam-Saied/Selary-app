<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <meta name="viewport" content="width=1024, maximum-scale=1, user-scalable=no">
    <title>Salary Sheet</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="wallet.png">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="wallet.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff; 
            min-width: 100%;
        }
        
        /* Document Container Styling */
        .document-container {
            width: 100%; 
            min-height: auto !important; 
            margin: 2rem auto;
            background: #ffffff;
            padding: 1.5cm 1.5cm;
            border-radius: 4px;
            position: relative;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        th, td {
            border: 1px solid #1f2937; 
            padding: 8px 10px;
            color: #111827;
            font-size: 20px;
        }

        th {
            background-color: #f3f4f6;
            font-weight: bold;
        }

        .name-col { white-space: nowrap; font-weight: 500; }
        
        /* Inputs inside table */
        input[type="number"], .editable-text {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            font-size: inherit;
            color: #111827;
            text-align: right;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }

        /* === Absent Column হাইড/শো করার সিএসএস === */
        .absent-col {
            display: none;
        }
        .show-absent .absent-col {
            display: table-cell;
        }

        /* Highlight editable areas in web view */
        @media screen {
            .input-cell {
                background-color: #f8fafc;
                transition: background-color 0.2s, box-shadow 0.2s;
                cursor: text;
            }
             .input-cell:focus-within {
                background-color: #e0f2fe;
                box-shadow: inset 0 0 0 1px #3b82f6;
            }
            .inline-input {
                border-bottom: 1px dashed #64748b;
                min-width: 120px;
                display: inline-block;
                padding: 0 4px;
                outline: none;
                transition: background 0.2s;
            }
            .inline-input:focus { background-color: #e0f2fe; }
            
            /* Custom styling for the dropdown */
            .type-select {
                background-color: #e2e8f0;
                border: 1px solid #94a3b8;
                border-radius: 4px;
                padding: 2px 5px;
                font-weight: bold;
                color: #0f172a;
                outline: none;
                cursor: pointer;
            }

            th:last-child,
            td:last-child {
                display: none;
            }
        }

        /* Print Specific Styles */
        @media print {
            @page {
                size: A4 portrait;
                margin: 2cm 1.5cm;
                page-break-after:avoid; 
            }
            body {
                background-color: transparent !important;
                margin: 0; padding: 0;
                min-width: auto; 
            }
            .document-container {
                box-shadow: none !important; margin: 0 !important; padding: 0 !important;
                border: none !important; border-radius: 0 !important;
                width: 100% !important; max-width: 100% !important;
            }
            .no-print { display: none !important; } 
            
            th { background-color: transparent !important; color-adjust: exact; -webkit-print-color-adjust: exact; }
            th, td { border: 1px solid #000 !important; 
            font-size: 14px !important ;
        }

            .input-cell { background-color: transparent !important; box-shadow: none !important; }
            .inline-input { border-bottom: none !important; padding: 0 !important; padding-left: 5px !important; }
            
            /* Replace dropdown with plain text on print */
            .type-select {
                appearance: none; -webkit-appearance: none;
                border: none; background: transparent; color: #000;
                font-weight: 600; font-size: 14px; padding: 0; text-align: center;
                display: block; width: 100%;
            }
            
            /* For the new month select dropdown printing */
            #month-input {
                appearance: none; -webkit-appearance: none;
                background: transparent; border: none;
                color: #000; font-family: inherit; font-size: inherit;
                text-align: left;
            }
            th:last-child,
            td:last-child {
                display: table-cell !important;
            }
            /* === প্রিন্ট করার সময় Absent কলাম সম্পূর্ণ গায়েব থাকবে === */
            .absent-col {
                display: none !important;
            }
        }

        /* ===== SALARY ADJUSTER PANEL STYLES (নতুন — মূল কোড স্পর্শ করা হয়নি) ===== */
        #adj-panel {
            background: linear-gradient(135deg, #f0fdf4 0%, #f0f9ff 100%);
            border: 1.5px solid #86efac;
            border-radius: 10px;
            padding: 12px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 1px 6px rgba(16,185,129,0.10);
        }
        #adj-panel label {
            font-size: 13px;
            font-weight: 600;
            color: #166534;
            white-space: nowrap;
        }
        #adj-panel select, #adj-panel input[type="number"] {
            border: 1.5px solid #86efac;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 13px;
            font-weight: 600;
            background: #fff;
            color: #14532d;
            outline: none;
            min-width: 80px;
            -moz-appearance: textfield;
        }
        #adj-panel select { cursor: pointer; }
        #adj-panel input[type="number"]::-webkit-outer-spin-button,
        #adj-panel input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #adj-btn {
            background: linear-gradient(90deg, #16a34a, #0ea5e9);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            white-space: nowrap;
        }
        #adj-btn:hover { opacity: 0.88; transform: scale(1.03); }
        #adj-reset-btn {
            background: #fff;
            color: #dc2626;
            border: 1.5px solid #fca5a5;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        #adj-reset-btn:hover { background: #fef2f2; }
        #adj-status {
            font-size: 12px;
            color: #15803d;
            font-weight: 600;
            min-width: 80px;
            transition: opacity 0.3s;
            opacity: 0;
        }
        .adj-divider {
            width: 1px; height: 28px;
            background: #bbf7d0;
            margin: 0 2px;
        }
    </style>
</head>
<body>

    <!-- Top Action Bar (Web Only) -->
    <div class="max-w-4xl mx-auto mt-6 mb-2 flex justify-between items-center px-4 no-print">
        <div class="flex items-center gap-3">
            <button onclick="window.print()" class="bg-indigo-600 text-white px-6 py-2.5 rounded shadow hover:bg-indigo-700 font-semibold flex items-center gap-2 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                Print Sheet
            </button>
            <button onclick="generateAndDownloadCSV()" class="bg-emerald-600 text-white px-6 py-2.5 rounded shadow hover:bg-emerald-700 font-semibold flex items-center gap-2 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                SMS (CSV)
            </button>
            <span id="save-status" class="text-sm text-green-600 font-medium opacity-0 transition-opacity duration-300">✓ Auto-saved</span>
        </div>
        <div class="flex items-center gap-5">
            <!-- === নতুন: Fix Base চেকবক্স (সবসময় দৃশ্যমান থাকবে) === -->
            <label class="flex items-center gap-2 cursor-pointer select-none text-gray-700 font-medium">
                <input type="checkbox" id="fix-base-toggle" class="w-4 h-4 text-green-600 border-gray-300 rounded focus:ring-green-500">
                <span class="text-green-700">Fix Base</span>
            </label>

            <label class="flex items-center gap-2 cursor-pointer select-none text-gray-700 font-medium">
                <input type="checkbox" id="edit-toggle" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                <span>Unlock Edit</span>
            </label>
            <button onclick="resetData()" class="bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded hover:bg-red-100 font-medium text-sm transition">
                Reset Data
            </button>
        </div>
    </div>

    <!-- ===== SALARY ADJUSTER PANEL (নতুন — মূল কোডের বাইরে) ===== -->
    <div class="max-w-4xl mx-auto px-4 no-print">
        <div id="adj-panel">
            <label>⚡ Bulk Salary Adjust:</label>
            <select id="adj-mode">
                <option value="increase_pct">Increase %</option>
                <option value="decrease_pct">Decrease %</option>
                <option value="set_fixed">Set Fixed ৳</option>
                <option value="increase_flat">Increase ৳ (Flat)</option>
                <option value="decrease_flat">Decrease ৳ (Flat)</option>
            </select>
            <input type="number" id="adj-value" placeholder="Amount" min="0" style="width:110px;">
            <button id="adj-btn" onclick="applyBulkAdjust()">Apply to All</button>
            <div class="adj-divider"></div>
            <button id="adj-reset-btn" onclick="resetBulkAdjust()">↩ Restore DB</button>
            <span id="adj-status">✓ Applied!</span>
        </div>
    </div>
    <!-- ===== END SALARY ADJUSTER PANEL ===== -->

    <!-- Main Document -->
    <div class="document-container">
        
        <!-- Pre-printed Pad Header Mockup (Hidden on Print) -->
        <div class="text-center mb-8 no-print border-b-2 border-gray-200 pb-6">
            <h1 class="text-3xl font-bold text-gray-900 tracking-wide">Abdur Razzak Dakhil Madrasa</h1>
            <p class="text-gray-600 mt-1 font-medium">Sarafbhata, Rangunia, Chattogram.</p>
          
        </div>

        <!-- Document Title -->
        <div style="margin-top: 80px" class="text-center mb-6">
            <h2 id="statement-title" class="text-xl font-bold inline-block border-b-2 border-black pb-1 uppercase tracking-wider">Salary Statement</h2>
        </div>

        <!-- Info Section (Month & Year) -->
        <div class="flex justify-between mb-4 font-semibold text-gray-800 no-print text-xl">
            <div>
                Month: 
                <select class="inline-input" id="month-input" data-key="month" style="appearance: none; -webkit-appearance: none; cursor: pointer; text-align: left; background: transparent; font-family: inherit; font-size: inherit; color: inherit;">
                    <option value="January">January</option>
                    <option value="February">February</option>
                    <option value="March">March</option>
                    <option value="April">April</option>
                    <option value="May">May</option>
                    <option value="June">June</option>
                    <option value="July">July</option>
                    <option value="August">August</option>
                    <option value="September">September</option>
                    <option value="October">October</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                </select>
            </div>
            <div>
                Year: <span class="inline-input" id="year-input" contenteditable="true" data-key="year">2026</span>
            </div>
        </div>

        <!-- Table -->
        <table id="main-table" class="show-absent">
            <thead>
                <tr>
                    <th style="width: 3%;">Sl.</th>
                    <th style="width: 22%; text-align: left;">Name of Employee</th>
                    <th style="width: 23%; text-align: left;">Designation</th>
                    <th style="width: 13%; text-align: center;">Salary</th>
                    <!-- Absent (Days) কলাম -->
                    <th class="absent-col" style="width: 8%; text-align: center;">Absent</th>
                    <th style="width: 13%;">
                        <select id="extra-type" class="type-select w-full text-center">
                            <option value="deduction" selected>Deduction</option>
                            <option value="bonus">Bonus</option>
                        </select>
                    </th>
                    <th style="width: 13%; text-align: center;">Total</th>
                    <th style="width: 13%;">Signature</th>
                </tr>
            </thead>
            <tbody id="salary-body">
                <!-- Rows will be injected by JavaScript -->
            </tbody>
        </table>

        <!-- Grand Total -->
        <div class="flex justify-end mt-4 pr-4">
            <div class="text-lg font-bold text-black pb-1">
                Grand Total: <span id="grand-total-text" class="ml-3 inline-block min-w-[100px] text-right"></span>/=
            </div>
        </div>

        <!-- Signatures -->
        <div style="margin-top:60px;" class="flex justify-between text-center text-sm font-bold">
            <div>
                <div class="border-t border-black w-32 mx-auto mb-1"></div>
                <p>Prepared By</p>
                <p class="font-normal text-xs">(Signature & Date)</p>
            </div>
            <div>
                <div class="border-t border-black w-32 mx-auto mb-1"></div>
                <p>Date of Payment</p>
            </div>
            <div>
                <div class="border-t border-black w-40 mx-auto mb-1"></div>
                <p>Superintendent</p>
                <p class="font-normal text-xs">(Signature & Seal)</p>
                
            </div>
        </div>

    </div>

    <!-- Logic Script (মূল — একটি অক্ষরও পরিবর্তন করা হয়নি) -->
    <script>
        let allowManualEdit = localStorage.getItem('madrasa_edit_mode') === 'true';

        // Employee Data
        const employees = [
    { id: 1, name: "Md Jabedul Islam", desig: "Superintendent", defaultSalary: 5000, phone: "8801837713062" },
    { id: 2, name: "Md Rakibul Anwar", desig: "Assistant Head", defaultSalary: 4500, phone: "8801614319044" },
    { id: 3, name: "Nandita Shil", desig: "Senior Teacher", defaultSalary: 4500, phone: "8801749860972" },
    { id: 4, name: "Md Joynal Abedin", desig: "Senior Mudarris", defaultSalary: 4500, phone: "8801646505949" },
    { id: 5, name: "Mahafoujul Hoque Ador", desig: "Senior Teacher", defaultSalary: 4000, phone: "8801881609751" },
    { id: 6, name: "Muhammad Sohel", desig: "Assistant Teacher", defaultSalary: 3300, phone: "8801575427921" },
    { id: 7, name: "Any Akter Nishu", desig: "Assistant Teacher", defaultSalary: 3500, phone: "8801617389043" },
    { id: 8, name: "Nur Kamal Tamjid", desig: "Assistant Mudarris", defaultSalary: 3500, phone: "8801810598698" },
    { id: 9, name: "Sadia Jahan", desig: "Assistant Teacher", defaultSalary: 3300, phone: "8801814138700" },
    { id: 10, name: "Sabrina Sultana Priya", desig: "Assistant Teacher", defaultSalary: 3300, phone: "8801608927540" },
    { id: 11, name: "Tausiful Hoque Mayen", desig: "Assistant Teacher", defaultSalary: 3300, phone: "8801797594046" },
    { id: 12, name: "Raisul Islam Saied", desig: "Assistant Teacher", defaultSalary: 3300, phone: "8801610988489" },
    { id: 13, name: "Fahmida Sikder Jhuma", desig: "Assistant Teacher", defaultSalary: 3300, phone: "8801831818588" },
    { id: 14, name: "Urmi Karim Samu", desig: "Assistant Teacher", defaultSalary: 3300, phone: "8801823958817" },
    { id: 15, name: "Md Mijan", desig: "Assistant Teacher", defaultSalary: 3000, phone: "8801814999592" },
    { id: 16, name: "Arifa Akter", desig: "Assistant Teacher", defaultSalary: 2000, phone: "8801871152548" },
    { id: 17, name: "Niamat Ali", desig: "Office Assistant", defaultSalary: 2600, phone: "8801870312623" }
];

        const tbody = document.getElementById('salary-body');
        const monthInput = document.getElementById('month-input');
        const yearInput = document.getElementById('year-input');
        const extraTypeSelect = document.getElementById('extra-type');
        const mainTable = document.getElementById('main-table');
        const editToggle = document.getElementById('edit-toggle');
        const fixBaseToggle = document.getElementById('fix-base-toggle');
        let saveTimeout;

        function updateTitle() {
            const titleEl = document.getElementById('statement-title');
            if (titleEl) {
                titleEl.innerText = `Salary Statement of ${monthInput.value} - ${yearInput.innerText}`;
            }
        }

        // Helper function: Get base salary for calculations (either typed or DB default)
        function getBaseSalaryForCalc(tr) {
            const enteredSalary = parseFloat(tr.querySelector('.salary-input').value) || 0;
            const defaultSalary = parseFloat(tr.getAttribute('data-default-salary')) || 0;
            const isFixed = fixBaseToggle.checked;
            return isFixed ? defaultSalary : enteredSalary;
        }

        // Initialize Table
        function renderTable() {
            tbody.innerHTML = '';
            
            const readonlyAttr = allowManualEdit ? '' : 'readonly';

            employees.forEach(emp => {
                const tr = document.createElement('tr');
                tr.setAttribute('data-id', emp.id);
                // মূল বেতন ডাটাবেস থেকে ট্যাগে সংরক্ষণ করা হলো 
                tr.setAttribute('data-default-salary', emp.defaultSalary); 
                tr.innerHTML = `
                    <td class="text-center">${emp.id}</td>
                    <td class="name-col">${emp.name}</td>
                    <td>${emp.desig}</td>
                    <td class="input-cell"><input type="number" class="salary-input" data-field="salary" value="${emp.defaultSalary}" ${readonlyAttr}></td>
                    <td class="input-cell absent-col"><input type="number" class="absent-input" placeholder="0"></td>
                    <td class="input-cell"><input type="number" class="extra-input" data-field="extra" ${readonlyAttr}></td>
                    <td class="text-right font-semibold total-col"></td>
                    <td></td>
                `;
                tbody.appendChild(tr);
            });
            attachListeners();
        }

        function getDaysInMonth(monthName, yearStr) {
            const year = parseInt(yearStr) || new Date().getFullYear();
            const monthIndex = new Date(Date.parse(monthName + " 1, 2020")).getMonth() + 1;
            return new Date(year, monthIndex, 0).getDate();
        }

        const recalcAll = () => {
            const daysInMonth = getDaysInMonth(monthInput.value, yearInput.innerText);
            
            document.querySelectorAll('tr[data-id]').forEach(tr => {
                const baseCalcSalary = getBaseSalaryForCalc(tr);
                const extraInput = tr.querySelector('.extra-input');
                const absentInput = tr.querySelector('.absent-input');
                
                if (absentInput.value !== '') {
                    const absentDays = parseFloat(absentInput.value) || 0;
                    if (absentDays > daysInMonth) {
                        absentInput.value = '';
                    }
                }
                
                if (extraTypeSelect.value === 'deduction') {
                    const absentDays = parseFloat(absentInput.value) || 0;
                    if (absentDays > 0 && baseCalcSalary > 0) {
                        extraInput.value = Math.round((baseCalcSalary / daysInMonth) * absentDays);
                    } else {
                        extraInput.value = ''; 
                    }
                } else if (extraTypeSelect.value === 'bonus') {
                    if (baseCalcSalary > 0) {
                        extraInput.value = Math.round(baseCalcSalary / 2); 
                    } else {
                        extraInput.value = '';
                    }
                }
            });
            document.querySelectorAll('tr[data-id]').forEach(calculateRow);
            calculateGrandTotal();
            updateTitle();
            triggerSave();
        };

        function attachListeners() {
            document.querySelectorAll('input[type="number"]').forEach(input => {
                input.addEventListener('input', (e) => {
                    const tr = input.closest('tr');
                    const baseCalcSalary = getBaseSalaryForCalc(tr);
                    const extraInput = tr.querySelector('.extra-input');
                    const absentInput = tr.querySelector('.absent-input');

                    if (input.classList.contains('absent-input')) {
                        const inputDays = parseFloat(input.value) || 0;
                        const daysInMonth = getDaysInMonth(monthInput.value, yearInput.innerText);
                        
                        if (inputDays > daysInMonth) {
                            alert("ভুল ইনপুট! " + monthInput.value + " মাসে সর্বোচ্চ " + daysInMonth + " দিন রয়েছে।");
                            input.value = ''; 
                        }
                    }

                    if (input.classList.contains('salary-input') && extraTypeSelect.value === 'bonus') {
                        if (baseCalcSalary > 0) {
                            extraInput.value = Math.round(baseCalcSalary / 2);
                        } else {
                            extraInput.value = ''; 
                        }
                    }

                    if ((input.classList.contains('salary-input') || input.classList.contains('absent-input')) && extraTypeSelect.value === 'deduction') {
                        let absentDays = parseFloat(absentInput.value) || 0;
                        const daysInMonth = getDaysInMonth(monthInput.value, yearInput.innerText);

                        if (input.classList.contains('absent-input') && absentDays > daysInMonth) {
                            alert(`Invalid input! ${monthInput.value} has only ${daysInMonth} days.`);
                            absentInput.value = '';
                            absentDays = 0;
                        }

                        if (absentDays > 0 && baseCalcSalary > 0) {
                            extraInput.value = Math.round((baseCalcSalary / daysInMonth) * absentDays);
                        } else if (input.classList.contains('absent-input') && absentDays === 0) {
                            extraInput.value = ''; 
                        }
                    }

                    calculateRow(tr);
                    calculateGrandTotal(); 
                    triggerSave();
                });
            });

            monthInput.addEventListener('change', recalcAll);
            yearInput.addEventListener('input', recalcAll);

            extraTypeSelect.addEventListener('change', () => {
                // সব সময় Absent কলাম দৃশ্যমান থাকবে 
                mainTable.classList.add('show-absent');
                recalcAll(); 
            });

            fixBaseToggle.addEventListener('change', (e) => {
                localStorage.setItem('madrasa_fix_base_mode', e.target.checked);
                recalcAll(); 
            });
        }

        function calculateRow(tr) {
            const enteredSalary = parseFloat(tr.querySelector('.salary-input').value) || 0;
            const baseCalcSalary = getBaseSalaryForCalc(tr);
            const extra = parseFloat(tr.querySelector('.extra-input').value) || 0;
            const absentDays = parseFloat(tr.querySelector('.absent-input').value) || 0;
            const isBonus = extraTypeSelect.value === 'bonus';
            
            // কর্তনের হিসাব (উভয় ক্ষেত্রেই - ফিক্স অন থাকলে ডাটাবেস বেতন থেকে কাটবে)
            let deduction = 0;
            if (absentDays > 0 && baseCalcSalary > 0) {
                const daysInMonth = getDaysInMonth(monthInput.value, yearInput.innerText);
                deduction = Math.round((baseCalcSalary / daysInMonth) * absentDays);
            }

            let total = 0;
            if (enteredSalary > 0 || extra > 0) {
                if (isBonus) {
                    // বোনাস থাকলে: (বেতন - কর্তন) + বোনাস
                    total = (enteredSalary - deduction) + extra;
                } else {
                    // কর্তন মোডে extra টাই হচ্ছে মূল কর্তন
                    total = enteredSalary - extra;
                }
            }
            
            const totalCol = tr.querySelector('.total-col');
            if(total === 0 && !tr.querySelector('.salary-input').value && !tr.querySelector('.extra-input').value) {
                totalCol.innerText = '';
            } else {
                totalCol.innerText = total.toLocaleString('en-IN');
            }

            // প্রিন্টের সময় বেতন কলামে কর্তন-পরবর্তী বেতন দেখানোর জন্য ডাটা সেভ রাখা হলো
            tr.dataset.baseSalary = tr.querySelector('.salary-input').value;
            tr.dataset.deduction = deduction;
        }

        function calculateGrandTotal() {
            let grandTotal = 0;
            document.querySelectorAll('.total-col').forEach(col => {
                const val = parseFloat(col.innerText.replace(/,/g, '')) || 0;
                grandTotal += val;
            });
            
            const grandTotalEl = document.getElementById('grand-total-text');
            if (grandTotal > 0) {
                grandTotalEl.innerText = grandTotal.toLocaleString('en-IN');
            } else {
                grandTotalEl.innerText = '';
            }
        }

        const STORAGE_KEY = 'madrasa_salary_data';

        function triggerSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveData, 500); 
        }

        function saveData() {
            const data = {
                month: monthInput.value,
                year: yearInput.innerText,
                type: extraTypeSelect.value,
                records: {}
            };

            document.querySelectorAll('tr[data-id]').forEach(tr => {
                const id = tr.getAttribute('data-id');
                const s = tr.querySelector('.salary-input').value;
                const a = tr.querySelector('.absent-input').value;
                const e = tr.querySelector('.extra-input').value;
                data.records[id] = { salary: s, absent: a, extra: e };
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            showSaveStatus();
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            // ডাটা লোড করার সময়ও Absent কলাম দৃশ্যমান রাখা
            mainTable.classList.add('show-absent');

            if (saved) {
                const data = JSON.parse(saved);
                
                if(data.month) monthInput.value = data.month;
                if(data.year) yearInput.innerText = data.year;
                if(data.type) extraTypeSelect.value = data.type;

                document.querySelectorAll('tr[data-id]').forEach(tr => {
                    const id = tr.getAttribute('data-id');
                    if (data.records && data.records[id]) {
                        if(data.records[id].salary !== undefined && data.records[id].salary !== '') {
                            tr.querySelector('.salary-input').value = data.records[id].salary;
                        }
                        tr.querySelector('.absent-input').value = data.records[id].absent || '';
                        tr.querySelector('.extra-input').value = data.records[id].extra || '';
                        calculateRow(tr);
                    }
                });
            } else {
                document.querySelectorAll('tr[data-id]').forEach(calculateRow);
            }
            calculateGrandTotal(); 
            updateTitle(); 
        }

        function resetData() {
            if (confirm("Are you sure you want to clear inputs for a new month? (Salary will be kept)")) {
                
                const currentMonthName = new Date().toLocaleString('en-US', { month: 'long' });
                monthInput.value = currentMonthName;
                document.getElementById('year-input').innerText = new Date().getFullYear().toString();
                
                extraTypeSelect.value = 'deduction';
                mainTable.classList.add('show-absent');
                
                document.querySelectorAll('tr[data-id]').forEach(tr => {
                    tr.querySelector('.absent-input').value = '';
                    tr.querySelector('.extra-input').value = '';
                    calculateRow(tr); 
                });
                
                calculateGrandTotal();
                updateTitle(); 
                saveData(); 
            }
        }

        function showSaveStatus() {
            const status = document.getElementById('save-status');
            status.style.opacity = '1';
            setTimeout(() => { status.style.opacity = '0'; }, 2000);
        }

        // === প্রিন্ট করার ঠিক আগে বেতনের মান পরিবর্তন করার লজিক ===
        window.addEventListener('beforeprint', () => {
            if (extraTypeSelect.value === 'bonus') {
                document.querySelectorAll('tr[data-id]').forEach(tr => {
                    const salaryInput = tr.querySelector('.salary-input');
                    const baseSalary = parseFloat(tr.dataset.baseSalary) || 0;
                    const deduction = parseFloat(tr.dataset.deduction) || 0;
                    
                    // বেতনের কলামে কর্তন-পরবর্তী বেতন বসিয়ে দেওয়া হলো
                    if (baseSalary > 0 && deduction > 0) {
                        salaryInput.value = baseSalary - deduction;
                    }
                });
            }
        });

        // === প্রিন্ট হওয়ার পর আবার মূল বেতনে ফিরিয়ে আনার লজিক ===
        window.addEventListener('afterprint', () => {
            if (extraTypeSelect.value === 'bonus') {
                document.querySelectorAll('tr[data-id]').forEach(tr => {
                    const salaryInput = tr.querySelector('.salary-input');
                    const rawBaseSalary = tr.dataset.baseSalary;
                    if (rawBaseSalary !== undefined) {
                        salaryInput.value = rawBaseSalary;
                    }
                });
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            // Edit Toggle Logic
            editToggle.checked = allowManualEdit;
            editToggle.addEventListener('change', (e) => {
                allowManualEdit = e.target.checked;
                localStorage.setItem('madrasa_edit_mode', allowManualEdit);
                
                document.querySelectorAll('.salary-input, .extra-input').forEach(input => {
                    if (allowManualEdit) {
                        input.removeAttribute('readonly');
                    } else {
                        input.setAttribute('readonly', 'true');
                    }
                });
            });

            // Fix Base Toggle Logic (সবসময় প্রযোজ্য)
            let isFixBase = localStorage.getItem('madrasa_fix_base_mode') === 'true';
            fixBaseToggle.checked = isFixBase;

            const currentMonthName = new Date().toLocaleString('en-US', { month: 'long' });
            monthInput.value = currentMonthName;
            
            renderTable();
            loadData();
            updateTitle(); 
        });

        document.addEventListener("focusin", function (e) {
            if (e.target.type === "number") {
                setTimeout(() => {
                    const val = e.target.value;
                    e.target.value = '';
                    e.target.value = val;
                }, 10);
            }
        });

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("./service-worker.js")
            .then(reg => {
                reg.update();
                reg.onupdatefound = () => {
                    const newWorker = reg.installing;
                    newWorker.onstatechange = () => {
                        if (newWorker.state === "installed") {
                            if (navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        }
                    };
                };
            });
        }
   
/**
         * applyBulkAdjust()
         * - মূল employees[] array বা data-default-salary attribute পরিবর্তন করে না।
         * - শুধু salary-input এর value পরিবর্তন করে।
         * - Fix Base চালু থাকলেও কর্তন/বোনাস মূল DB বেতন থেকে হবে (আগের মতো)।
         * - Apply করার পর recalcAll() ডাকা হয় যাতে Total কলাম আপডেট হয়।
         */
        function applyBulkAdjust() {
            const mode = document.getElementById('adj-mode').value;
            const val = parseFloat(document.getElementById('adj-value').value);

            if (isNaN(val) || val < 0) {
                alert('অনুগ্রহ করে একটি সঠিক মান দিন।');
                return;
            }

            // Unlock করা না থাকলে temporarily unlock করে apply করব
            const wasReadonly = !allowManualEdit;
            if (wasReadonly) {
                document.querySelectorAll('.salary-input').forEach(i => i.removeAttribute('readonly'));
            }

            document.querySelectorAll('tr[data-id]').forEach(tr => {
                const input = tr.querySelector('.salary-input');
                // বর্তমানে যা দেখাচ্ছে সেটাই base (DB value নয়)
                const currentSalary = parseFloat(input.value) || 0;
                // DB-তে যা আছে (পরিবর্তন হবে না)
                const dbSalary = parseFloat(tr.getAttribute('data-default-salary')) || 0;

                let newSalary = currentSalary;

                if (mode === 'increase_pct') {
                    newSalary = Math.round(currentSalary * (1 + val / 100));
                } else if (mode === 'decrease_pct') {
                    newSalary = Math.max(0, Math.round(currentSalary * (1 - val / 100)));
                } else if (mode === 'set_fixed') {
                    newSalary = Math.round(val);
                } else if (mode === 'increase_flat') {
                    newSalary = currentSalary + Math.round(val);
                } else if (mode === 'decrease_flat') {
                    newSalary = Math.max(0, currentSalary - Math.round(val));
                }

                input.value = newSalary;
            });

            // যদি আগে locked ছিল, আবার lock করে দাও
            if (wasReadonly) {
                document.querySelectorAll('.salary-input').forEach(i => i.setAttribute('readonly', 'true'));
            }

            // মূল recalcAll ডাকো — এতে Deduction/Bonus সব আগের নিয়মে কাজ করবে
            recalcAll();

            // Status দেখাও
            const status = document.getElementById('adj-status');
            status.style.opacity = '1';
            setTimeout(() => { status.style.opacity = '0'; }, 2000);
        }

        /**
         * resetBulkAdjust()
         * - সব salary-input কে মূল DB (employees[]) এর defaultSalary-তে ফিরিয়ে দেয়।
         * - data-default-salary attribute থেকে পড়া হয়, employees[] array অটুট থাকে।
         */
        function resetBulkAdjust() {
            const wasReadonly = !allowManualEdit;
            if (wasReadonly) {
                document.querySelectorAll('.salary-input').forEach(i => i.removeAttribute('readonly'));
            }

            document.querySelectorAll('tr[data-id]').forEach(tr => {
                const input = tr.querySelector('.salary-input');
                const dbSalary = tr.getAttribute('data-default-salary');
                if (dbSalary) input.value = dbSalary;
            });

            if (wasReadonly) {
                document.querySelectorAll('.salary-input').forEach(i => i.setAttribute('readonly', 'true'));
            }

            recalcAll();

            const status = document.getElementById('adj-status');
            status.textContent = '↩ Restored!';
            status.style.opacity = '1';
            setTimeout(() => {
                status.style.opacity = '0';
                status.textContent = '✓ Applied!';
            }, 2000);
        }
    /**
     * ডাইনামিক SMS জেনারেটর এবং CSV এক্সপোর্ট 
     */
    function generateAndDownloadCSV() {
        let csvContent = "Phone,Message\n";
        
        const monthYear = `${monthInput.value} ${yearInput.innerText}`;
        const daysInMonth = getDaysInMonth(monthInput.value, yearInput.innerText);
        const type = extraTypeSelect.value; 

        document.querySelectorAll('tr[data-id]').forEach(tr => {
            const id = parseInt(tr.getAttribute('data-id'));
            const emp = employees.find(e => e.id === id);
            
            if (!emp || !emp.phone) return;

            const dbSalary = parseFloat(tr.getAttribute('data-default-salary')) || 0;
            const currentSalary = parseFloat(tr.querySelector('.salary-input').value) || 0;
            const salaryDiff = currentSalary - dbSalary;

            const absentDays = parseFloat(tr.querySelector('.absent-input').value) || 0;
            const extra = parseFloat(tr.querySelector('.extra-input').value) || 0;
            const netPayable = tr.querySelector('.total-col').innerText.trim() || "0";
            const baseCalcSalary = getBaseSalaryForCalc(tr);

            let absentDeduction = 0;
            if (absentDays > 0 && baseCalcSalary > 0) {
                absentDeduction = Math.round((baseCalcSalary / daysInMonth) * absentDays);
            }

            let msg = "";

            // শর্ট মেসেজ কন্ডিশন: যদি কোনো পরিবর্তন না থাকে
            if (salaryDiff === 0 && extra === 0 && absentDays === 0) {
                msg = `Dear ${emp.name}, your salary for ${monthYear} has been processed and the net payable amount is ${netPayable} BDT; Please collect it from the office. -ARDM`;
            } else {
                // বিস্তারিত মেসেজ জেনারেট (যদি কোনো পরিবর্তন থাকে)
                msg = `Dear ${emp.name}, Your salary for ${monthYear} has been processed.\n\n`;
                
                msg += `- Basic Salary: ${dbSalary} BDT\n`;

                if (salaryDiff > 0) {
                    msg += `- Salary Increment: +${salaryDiff} BDT\n`;
                } else if (salaryDiff < 0) {
                    msg += `- Salary Adjustment (Decrease): ${salaryDiff} BDT\n`;
                }

                if (type === 'bonus' && extra > 0) {
                    msg += `- Bonus: +${extra} BDT\n`;
                }

                if (absentDays > 0) {
                    msg += `- Absence Deduction (${absentDays} Days): -${absentDeduction} BDT\n`;
                }

                if (type === 'deduction') {
                    let madrasahHold = extra - absentDeduction;
                    if (madrasahHold > 0) {
                        msg += `- Madrasah Deduction/Hold: -${madrasahHold} BDT\n`;
                    } else if (madrasahHold < 0) {
                        msg += `- Other Adjustment: +${Math.abs(madrasahHold)} BDT\n`;
                    }
                }

                // মেসেজের শেষ অংশ
                msg += `\nNet Payable Now: ${netPayable} BDT\n\n`;
                msg += `Please visit the office to collect your payment.\n\n`;
                msg += `- Abdur Razzaq Dakhil Madrasah`;
            }

            let formattedMsg = `"${msg.replace(/"/g, '""')}"`;
            let formattedPhone = `"${emp.phone}"`;

            csvContent += `${formattedPhone},${formattedMsg}\n`;
        });

        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' }); 
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", `Salary_SMS_${monthInput.value}_${yearInput.innerText}.csv`);
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

                                                                                     }
        </script>
